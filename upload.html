<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>上传图书</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        h2 {
            padding: 10px 0px;
        }
    </style>
</head>

<body>
    <div class="container mt-5">
        <h2>📤 上传图书</h2>
        <a href="shouye.php">⬅返回首页</a>
        <form action="php/upload.php" method="post" enctype="multipart/form-data">
            <div class="form-group">
                <label>图书标题</label>
                <input type="text" name="title" class="form-control" required>
            </div>
            <div class="form-group">
                <label>封面图片</label>
                <input type="file" name="pic" accept="image/*" class="form-control-file" required>
            </div>
            <div class="form-group">
                <label>图书文件(pdf 或 epub)</label>
                <input type="file" name="bookfile" accept=".pdf,.epub" class="form-control-file" required>
            </div>
            <button type="submit" class="btn btn-primary">上传</button>
        </form>
    </div>
</body>

</html>
